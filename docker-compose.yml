services:
  mongo:
    image: mongo:7
    container_name: backup-monitoring-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: backup-monitoring-backend
    ports:
      - "8080:8080"
    environment:
      FRONTEND_URL: http://172.16.16.80:3000
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: backup_monitoring
      JWT_SECRET: test_secret_123
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: backup-monitoring-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_BACKEND_URL: http://172.16.16.80:8080
    depends_on:
      - backend

volumes:
  mongo_data: